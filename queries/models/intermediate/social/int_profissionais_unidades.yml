version: 2

models:
  - name: int_profissionais_unidades
    description: |
      Intermediate que unifica profissionais, unidades, contas e CBOs do
      Prontuário Carioca de Assistência Social (ex-Acolherio).
      Contém toda a lógica de negócio: joins entre 6 raw models,
      agregação de CBO único por profissional, filtro de registros
      de teste, e coalesce de nome_operador → nome.
      Grão: 1 linha por (conta × unidade × CBO).
    columns:
      - name: id_login
        description: "ID da conta do operador (seqlogin). FK para raw_operadores."
        tests:
          - not_null

      - name: id_unidade
        description: "ID da unidade (sequs). FK para raw_unidades."
        tests:
          - not_null

      - name: nome_unidade
        description: "Nome descritivo da unidade (dscus)."

      - name: territorio
        description: "CAS / território da unidade (apus)."

      - name: id_profissional
        description: "ID do profissional (seqprof). FK para raw_profissionais."

      - name: nome_profissional
        description: "Nome do profissional (nompess da gh_contas com fallback para nomeprof da gh_prof)."

      - name: cpf
        description: "CPF do profissional."

      - name: email
        description: "E-mail da conta do operador (dscemail da gh_contas)."

      - name: telefone
        description: "Telefone do profissional."

      - name: matricula
        description: "Matrícula do profissional."

      - name: flag_ativo
        description: "Indicador de profissional ativo (indativo da gh_prof). Sim/Não."

      - name: cbo_codigo
        description: "Código da CBO (Classificação Brasileira de Ocupações). Mínimo quando múltiplos CBOs."

      - name: cbo_descricao
        description: "Descrição da CBO."

      - name: data_cadastro
        description: "Data de cadastro da conta do operador."

      - name: data_ultimo_acesso
        description: "Data do último acesso da conta do operador."

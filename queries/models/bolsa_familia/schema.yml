version: 2

sources:
  - name: bolsa_familia_staging
    description: "Dados brutos do Bolsa Família carregados via pipeline Python"
    schema: "bolsa_familia_staging"
    tables:
      - name: folha
        description: "Tabela contendo a linha bruta do arquivo, timestamp e partição"

models:
  - name: int_bolsa_familia_parsed
    description: "Camada intermediária que faz o parsing da linha bruta para colunas estruturadas."
    columns:
      - name: qtd_colunas_brutas
        description: "Quantidade de colunas detectadas no split da linha bruta."
        data_tests:
          - accepted_values:
              values: [34]
              quote: false
      - name: COD_FAMILIAR
        data_tests:
          - not_null

  - name: folha
    description: "Tabela final (Mart) com dados consolidados e faixas de benefício."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [COD_FAMILIAR, COMPET_PARCELA]
          config:
            where: "MARCA_RF = 'S'"
          description: "Audit de Contexto: Garante que cada família (RF) tenha apenas um registro de VLRTOTAL por mês de competência."

version: 2

models:
  - name: mart_profissionais_unidades
    description: |
      Mart de profissionais vinculados às unidades do sistema.
      Grão: 1 linha por (conta × unidade × CBO).
      Select simples sobre int_profissionais_unidades com acréscimo
      da surrogate key id_profissional_unidade_sk.
      Toda a lógica de negócio (joins, agregação de CBO, filtro anti-teste)
      está na camada intermediate.
    columns:
      - name: id_profissional_unidade_sk
        description: "Surrogate key única da linha (id_login + id_unidade + cbo_codigo)."
        tests:
          - not_null
          - unique

      - name: id_login
        description: "ID da conta do operador (seqlogin). FK para raw_operadores."
        tests:
          - not_null

      - name: id_unidade
        description: "ID da unidade (sequs). FK para raw_unidades."
        tests:
          - not_null

      - name: nome_unidade
        description: "Nome descritivo da unidade (dscus)."

      - name: territorio
        description: "CAS / território da unidade (apus)."

      - name: id_profissional
        description: "ID do profissional (seqprof). FK para raw_profissionais."

      - name: nome_profissional
        description: "Nome do profissional/operador (nompess da gh_contas, fallback para nomeprof da gh_prof)."

      - name: cpf
        description: "CPF do profissional."

      - name: email
        description: "E-mail da conta do operador (dscemail da gh_contas)."

      - name: telefone
        description: "Telefone do profissional."

      - name: matricula
        description: "Matrícula do profissional."

      - name: flag_ativo
        description: "Indicador de profissional ativo (indativo da gh_prof). Sim/Não."

      - name: cbo_codigo
        description: "Código da CBO (Classificação Brasileira de Ocupações)."

      - name: cbo_descricao
        description: "Descrição da CBO."

      - name: data_cadastro
        description: "Data de cadastro da conta do operador."

      - name: data_ultimo_acesso
        description: "Data do último acesso da conta do operador."

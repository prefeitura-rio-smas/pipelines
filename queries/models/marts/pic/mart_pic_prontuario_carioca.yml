version: 2

models:
  - name: mart_pic_prontuario_carioca
    description: |
      Mart Prontuário Carioca para PIC.
      Grão: 1 linha por família identificada como PIC.
      Duas origens de identificação: (1) projeto social PIC via dim_familias.projetos_sociais,
      (2) evolução aba Pequenos Cariocas (codigo_abrangencia=20) via fct_evolucoes.
      Indicadores propagam para toda a família via LOGICAL_OR entre membros ativos.
      Famílias sem crianças 0-6 permanecem com membros = [].
    columns:
      - name: responsavel_familiar
        description: "Struct com CPF e nome do responsável familiar (dado por dim_familias.id_usuario_responsavel -> dim_usuarios)."
      - name: origem_identificacao
        description: "Array de strings identificando por quais origens a familia foi capturada: 'projeto_social' e/ou 'evolucao_aba_20'."
      - name: membros
        description: "Array de structs com nome, idade e CPF das criancas de 0 a 6 anos ativas na familia (data_saida IS NULL). Vazio se nao houver criancas nessa faixa."
      - name: indicador_violacao_direito
        description: "Booleano. True se algum membro ativo da familia possui flag_possui_violacao_direito = 'Sim'. Propagado via LOGICAL_OR."
      - name: violacao_direito
        description: "Array de strings com descricoes distintas de violacoes de direito de todos os membros ativos da familia."
      - name: possui_filiacao_completa
        description: "Booleano. True se algum membro ativo da familia possui filiacao completa na certidao (ultima evolucao codigo_abrangencia=24). Propagado via LOGICAL_OR."
      - name: interesse_filiacao_completa
        description: "Booleano. True se algum membro ativo tem interesse em regularizar filiacao faltante (ultima evolucao codigo_abrangencia=24). Propagado via LOGICAL_OR."
